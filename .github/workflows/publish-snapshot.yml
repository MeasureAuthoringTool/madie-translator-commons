name: Publish Snapshot

on:
  push:
    branches:
      - develop  # Runs only when code is pushed (merged) to develop

jobs:
  publish-snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'adopt'
          java-version: '17'

      - name: Configure Github Authentication for Maven
        uses: s4u/maven-settings-action@v2
        with:
          servers: '[{"id": "github", "username": "madieUser", "password": "${GITHUB_TOKEN_REF}"}]'
          githubServer: false

      - name: Build with Maven
        run: mvn clean install --file pom.xml
        env:
          GITHUB_TOKEN_REF: ${{ secrets.GH_PAT_FOR_ACTIONS_TOKEN }}

      - name: Extract Project Version
        id: project
        run: echo "::set-output name=version::$(mvn -q -Dexec.executable=echo -Dexec.args='${project.version}' --non-recursive exec:exec)"

      - name: Build and Publish SNAPSHOT Version
        if: contains(steps.project.outputs.version, '-SNAPSHOT')
        run: mvn -B --no-transfer-progress clean deploy -DskipTests
        env:
          GITHUB_TOKEN_REF: ${{ secrets.GITHUB_TOKEN }}
